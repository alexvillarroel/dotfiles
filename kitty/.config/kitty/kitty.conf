include ~/.config/omarchy/current/theme/kitty.conf

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# Window
window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Split movido aqui; ctrl+shift+enter ahora envia <C-S-CR> a la app (nvim: run cell)
map ctrl+shift+backslash new_window
map ctrl+shift+enter send_text all \x1b[13;6u
# "/" es codepoint 47; ctrl=5, ctrl+shift=6 (nvim: comentar / nueva celda # %%)
map ctrl+slash send_text all \x1b[47;5u
map ctrl+shift+slash send_text all \x1b[47;6u

# Allow remote access
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
